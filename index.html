<style>

*{

}

}

    border-radius:10px;
}

.card{
    min-width:30px;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    text-align:center;
    flex-shrink:0;
    transition:.3s;
    box-shadow:0 0 10px rgba(0, 180, 252, 0.4);
}

.card:hover{
    transform:translateY(-3px);
}

.city{
    font-size:10px;
    font-weight:bold;
    margin-top: -10px;
    margin-bottom:15px;
}

.temp{

}

.desc{

    font-size:14px;

}

.cold{
    border:2px solid #00d4ff;
    box-shadow:0 0 20px #00d4ff;
}

.cold .city{

}

    max-width:1200px;

}

h1{
    text-align:center;
    margin-bottom:20px;
}

<body>

<div id="container">
    
</div>

<div class="conteudo">
   

    <p class="atualizacao" id="atualizacao">
        Carregando informações...
    </p>
</div>

<script>

   const cidades = [
    {
        nome:"Urubici",
        lat:-28.015,
        lon:-49.592
    },
    {
        nome:"São Joaquim",
        lat:-28.293,
        lon:-49.932
    },
    {
        nome:"B.Jardim da Serra",
        lat:-28.337,
        lon:-49.637
    },
    {
        nome:"Lages",
        lat:-27.815,
        lon:-50.326
    },

    {
        nome:"Abdon Batista",
        lat:-27.612,
        lon:-51.024
    },
    {
        nome:"S.J. do Cerrito",
        lat:-27.661,
        lon:-50.573
    },
   
];


const container = document.getElementById("container");

async function carregarClima(){

    container.innerHTML = "";

    try{

        const resultados = await Promise.all(

            cidades.map(async cidade => {

                const url =
                `https://api.open-meteo.com/v1/forecast?latitude=${cidade.lat}&longitude=${cidade.lon}&current=temperature_2m`;

                const resposta = await fetch(url);

                if(!resposta.ok){
                    throw new Error("Erro na API");
                }

                const dados = await resposta.json();

                return{
                    nome:cidade.nome,
                    temp:dados.current.temperature_2m
                };

            })

        );

        const menorTemp = Math.min(...resultados.map(item => item.temp));

        resultados.forEach(cidade => {

            const card = document.createElement("div");

            card.className =
                cidade.temp === menorTemp
                ? "card cold"
                : "card";

            card.innerHTML = `
                <div class="city">${cidade.nome}</div>
                <div class="temp">${Math.round(cidade.temp)}°C</div>
                <div class="desc">
                    ${cidade.temp === menorTemp ? "❄" : ""}
                </div>
            `;

            container.appendChild(card);

        });

        document.getElementById("atualizacao").innerHTML =
        `Última atualização: ${new Date().toLocaleTimeString('pt-BR')}`;

    }catch(error){

        container.innerHTML =
        "<h3>Erro ao carregar dados climáticos.</h3>";

        console.error(error);

    }

}

carregarClima();

/* Atualiza a cada 10 minutos */
setInterval(carregarClima, 30000);







</script>
